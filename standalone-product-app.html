<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Product App</title>
  
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- React Router DOM -->
  <script src="https://unpkg.com/@remix-run/router@1.14.1/dist/router.umd.min.js"></script>
  <script src="https://unpkg.com/react-router@6.21.0/dist/umd/react-router.production.min.js"></script>
  <script src="https://unpkg.com/react-router-dom@6.21.0/dist/umd/react-router-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #09090b; --bg-secondary: #18181b; --bg-tertiary: #27272a;
      --bg-card: rgba(24, 24, 27, 0.7);
      --text-primary: #fafafa; --text-secondary: #a1a1aa;
      --accent-primary: #3b82f6; --accent-secondary: #1d4ed8;
      --accent-glow: rgba(59, 130, 246, 0.2);
      --success: #10b981; --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.08); --border-hover: rgba(255, 255, 255, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
    
    .glass { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2); }
    .glass-card { background: var(--bg-card); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 12px; transition: all 0.3s ease; }
    .glass-card:hover { transform: translateY(-4px); border-color: var(--border-hover); box-shadow: 0 12px 30px var(--accent-glow); }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    .page { padding: 2rem 0; min-height: calc(100vh - 80px); }
    .grid { display: grid; gap: 1.5rem; }
    .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    
    h1, h2, h3, h4 { font-weight: 600; letter-spacing: -0.02em; }
    h1 { font-size: 2.5rem; } h2 { font-size: 1.75rem; } h3 { font-size: 1.25rem; }
    a { color: inherit; text-decoration: none; }
    
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 500; border-radius: 8px; cursor: pointer; border: none; background: transparent; transition: all 0.2s; gap: 0.5rem; }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-icon { padding: 0.5rem; background: var(--bg-tertiary); color: var(--text-primary); border-radius: 6px; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.875rem; }
    .form-control { width: 100%; padding: 0.875rem 1rem; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); }
    
    .loading-spinner { display: flex; justify-content: center; align-items: center; padding: 4rem; color: var(--accent-primary); font-size: 1.2rem; font-weight: 500; animation: pulse 1.5s infinite ease-in-out; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 1024px) { .grid-cols-4 { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .grid-cols-4, .grid-cols-3 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .grid-cols-4, .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useMemo } = React;
    const { HashRouter: Router, Routes, Route, Navigate, Link, useNavigate, useLocation, useParams } = window.ReactRouterDOM;

    // --- Context & Hooks ---
    
    const CartContext = createContext();

    const CartProvider = ({ children }) => {
      const [cartItems, setCartItems] = useState(() => {
        try {
          const stored = localStorage.getItem('ecommerce_cart');
          return stored ? JSON.parse(stored) : [];
        } catch (e) { return []; }
      });

      useEffect(() => {
        localStorage.setItem('ecommerce_cart', JSON.stringify(cartItems));
      }, [cartItems]);

      const addToCart = (product) => {
        setCartItems(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          return [...prev, { ...product, quantity: 1 }];
        });
      };

      const removeFromCart = (id) => setCartItems(prev => prev.filter(item => item.id !== id));
      const updateQuantity = (id, q) => { if (q > 0) setCartItems(prev => prev.map(item => item.id === id ? { ...item, quantity: q } : item)); };
      const clearCart = () => setCartItems([]);

      return <CartContext.Provider value={{ cartItems, addToCart, removeFromCart, updateQuantity, clearCart }}>{children}</CartContext.Provider>;
    };

    const useCart = () => useContext(CartContext);
    
    const useCartTotal = () => {
      const { cartItems } = useCart();
      const { totalItems, totalPrice } = useMemo(() => {
        return cartItems.reduce((acc, item) => {
          acc.totalItems += item.quantity;
          acc.totalPrice += item.price * item.quantity;
          return acc;
        }, { totalItems: 0, totalPrice: 0 });
      }, [cartItems]);
      return { totalItems, totalPrice };
    };

    const useDebounce = (value, delay = 500) => {
      const [debouncedValue, setDebouncedValue] = useState(value);
      useEffect(() => {
        const handler = setTimeout(() => setDebouncedValue(value), delay);
        return () => clearTimeout(handler);
      }, [value, delay]);
      return debouncedValue;
    };

    const useProducts = (category = '') => {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        let isMounted = true;
        setLoading(true); setError(null);
        let url = 'https://fakestoreapi.com/products';
        if (category && category !== 'All Categories') url = `https://fakestoreapi.com/products/category/${category}`;
        
        fetch(url).then(res => res.json()).then(data => {
          if (isMounted) setProducts(data);
        }).catch(err => { if (isMounted) setError(err.message); })
        .finally(() => { if (isMounted) setLoading(false); });

        return () => { isMounted = false; };
      }, [category]);

      return { products, loading, error };
    };

    const useProductDetail = (id) => {
      const [product, setProduct] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        let isMounted = true;
        setLoading(true);
        fetch(`https://fakestoreapi.com/products/${id}`).then(res => res.json()).then(data => {
          if (isMounted) setProduct(data);
        }).catch(err => { if (isMounted) setError(err.message); })
        .finally(() => { if (isMounted) setLoading(false); });
        
        return () => { isMounted = false; };
      }, [id]);

      return { product, loading, error };
    };

    // --- Components ---
    
    const Navbar = () => {
      const { totalItems } = useCartTotal();
      const location = useLocation();
      const isActive = (path) => location.pathname === path ? 'var(--accent-primary)' : 'var(--text-primary)';

      return (
        <nav className="glass" style={{ position: 'sticky', top: 0, zIndex: 100, padding: '1rem 0' }}>
          <div className="container" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <Link to="/" style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>Eco<span style={{color: 'var(--accent-primary)'}}>Store</span></Link>
            <div style={{ display: 'flex', gap: '2rem', alignItems: 'center' }}>
              <Link to="/" style={{ color: isActive('/') }}>Home</Link>
              <Link to="/products" style={{ color: isActive('/products') }}>Shop</Link>
              <Link to="/cart" className="btn btn-primary" style={{ position: 'relative' }}>
                Cart
                {totalItems > 0 && (
                  <span style={{ position: 'absolute', top: '-8px', right: '-8px', background: 'var(--danger)', color: 'white', borderRadius: '50%', width: '24px', height: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.8rem', fontWeight: 'bold' }}>{totalItems}</span>
                )}
              </Link>
            </div>
          </div>
        </nav>
      );
    };

    const ProductCard = ({ product }) => {
      const { addToCart } = useCart();
      return (
        <div className="glass-card animate-in" style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <div style={{ background: 'white', padding: '2rem', height: '250px', display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: '12px 12px 0 0' }}>
            <img src={product.image} style={{ maxHeight: '100%', maxWidth: '100%', objectFit: 'contain' }} />
          </div>
          <div style={{ padding: '1.5rem', display: 'flex', flexDirection: 'column', flexGrow: 1 }}>
            <span style={{ color: 'var(--accent-primary)', fontSize: '0.75rem', textTransform: 'uppercase', fontWeight: 600, marginBottom: '0.5rem' }}>{product.category}</span>
            <Link to={`/products/${product.id}`} style={{ flexGrow: 1 }}><h3 style={{ fontSize: '1.1rem', marginBottom: '0.5rem' }}>{product.title.substring(0, 50)}...</h3></Link>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '1rem' }}>
              <span style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>${product.price.toFixed(2)}</span>
              <button className="btn btn-secondary" onClick={() => addToCart(product)}>Add +</button>
            </div>
          </div>
        </div>
      );
    };

    const CartItem = ({ item }) => {
      const { updateQuantity, removeFromCart } = useCart();
      return (
        <div className="glass-card animate-in" style={{ display: 'flex', padding: '1.5rem', gap: '1.5rem', alignItems: 'center', marginBottom: '1rem' }}>
          <div style={{ background: 'white', width: '80px', height: '80px', borderRadius: '8px', padding: '0.5rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <img src={item.image} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
          </div>
          <div style={{ flex: 1 }}>
            <h3 style={{ fontSize: '1.1rem', marginBottom: '0.5rem' }}>{item.title}</h3>
            <p style={{ color: 'var(--accent-primary)', fontWeight: 'bold' }}>${item.price.toFixed(2)}</p>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', background: 'var(--bg-tertiary)', padding: '0.5rem', borderRadius: '8px' }}>
            <button className="btn-icon" onClick={() => updateQuantity(item.id, item.quantity - 1)}>-</button>
            <span style={{ fontWeight: '500', width: '1.5rem', textAlign: 'center' }}>{item.quantity}</span>
            <button className="btn-icon" onClick={() => updateQuantity(item.id, item.quantity + 1)}>+</button>
          </div>
          <div style={{ textAlign: 'right', minWidth: '80px' }}>
            <p style={{ fontWeight: 'bold', fontSize: '1.2rem', marginBottom: '0.5rem' }}>${(item.price * item.quantity).toFixed(2)}</p>
            <button onClick={() => removeFromCart(item.id)} style={{ color: 'var(--danger)', fontSize: '0.85rem' }}>Remove</button>
          </div>
        </div>
      );
    };

    // --- Pages ---
    
    const Home = () => (
      <div className="container page animate-in" style={{ textAlign: 'center', paddingTop: '4rem' }}>
        <div className="glass" style={{ padding: '4rem', borderRadius: '24px' }}>
          <h1 style={{ fontSize: '4rem', marginBottom: '1rem', color: 'var(--accent-primary)' }}>Welcome to EcoStore</h1>
          <p style={{ fontSize: '1.25rem', color: 'var(--text-secondary)', marginBottom: '3rem' }}>Discover the latest products with our modern platform.</p>
          <div style={{ display: 'flex', gap: '1.5rem', justifyItems: 'center', justifyContent: 'center' }}>
            <Link to="/products" className="btn btn-primary" style={{ padding: '1rem 2rem' }}>Start Shopping</Link>
            <Link to="/cart" className="btn btn-secondary" style={{ padding: '1rem 2rem' }}>View Cart</Link>
          </div>
        </div>
      </div>
    );

    const Products = () => {
      const [category, setCategory] = useState('All Categories');
      const [searchTerm, setSearchTerm] = useState('');
      const { products, loading, error } = useProducts(category);
      const debouncedSearch = useDebounce(searchTerm, 400);

      const filteredProducts = useMemo(() => {
        if (!debouncedSearch) return products;
        return products.filter(p => p.title.toLowerCase().includes(debouncedSearch.toLowerCase()));
      }, [products, debouncedSearch]);

      const categories = ['All Categories', 'electronics', 'jewelery', "men's clothing", "women's clothing"];

      return (
        <div className="container page animate-in">
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '2rem' }}>
            <h2>All Products</h2>
            <div style={{ display: 'flex', gap: '1rem' }}>
              <input type="text" className="form-control" placeholder="Search..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
              <select className="form-control" value={category} onChange={(e) => setCategory(e.target.value)}>
                {categories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          {loading ? <div className="loading-spinner">Loading products...</div> : (
            <div className="grid grid-cols-4">
              {filteredProducts.map(p => <ProductCard key={p.id} product={p} />)}
            </div>
          )}
        </div>
      );
    };

    const ProductDetail = () => {
      const { id } = useParams();
      const { product, loading } = useProductDetail(id);
      const { addToCart } = useCart();

      if (loading) return <div className="loading-spinner">Loading details...</div>;
      if (!product) return <div className="container page">Not found</div>;

      return (
        <div className="container page animate-in">
          <Link to="/products" style={{ display: 'inline-block', marginBottom: '2rem', color: 'var(--text-secondary)' }}>&larr; Back to Shop</Link>
          <div className="glass" style={{ display: 'flex', gap: '4rem', padding: '3rem', borderRadius: '16px' }}>
            <div style={{ flex: '1', background: 'white', borderRadius: '12px', padding: '2rem', display: 'flex', justifyContent: 'center' }}>
              <img src={product.image} style={{ maxHeight: '400px', maxWidth: '100%', objectFit: 'contain' }} />
            </div>
            <div style={{ flex: '1', display: 'flex', flexDirection: 'column' }}>
              <span style={{ color: 'var(--accent-primary)', textTransform: 'uppercase', fontWeight: 'bold' }}>{product.category}</span>
              <h1 style={{ margin: '1rem 0' }}>{product.title}</h1>
              <div style={{ fontSize: '2.5rem', fontWeight: 'bold', marginBottom: '2rem' }}>${product.price.toFixed(2)}</div>
              <p style={{ color: 'var(--text-secondary)', lineHeight: 1.8, marginBottom: '3rem' }}>{product.description}</p>
              <button className="btn btn-primary" onClick={() => addToCart(product)} style={{ width: '100%', padding: '1rem' }}>Add to Cart</button>
            </div>
          </div>
        </div>
      );
    };

    const Cart = () => {
      const { cartItems, clearCart } = useCart();
      const { totalItems, totalPrice } = useCartTotal();
      const navigate = useNavigate();

      if (cartItems.length === 0) return (
        <div className="container page animate-in" style={{ textAlign: 'center', paddingTop: '4rem' }}>
          <h2>Your Cart is Empty</h2><br/>
          <Link to="/products" className="btn btn-primary">Start Shopping</Link>
        </div>
      );

      return (
        <div className="container page animate-in">
          <h1 style={{ marginBottom: '2rem' }}>Shopping Cart ({totalItems} items)</h1>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 350px', gap: '3rem', alignItems: 'start' }}>
            <div>
              <div style={{ textAlign: 'right', marginBottom: '1rem' }}><button className="btn btn-danger" onClick={clearCart}>Clear Cart</button></div>
              {cartItems.map(item => <CartItem key={item.id} item={item} />)}
            </div>
            <div className="glass" style={{ padding: '2rem', position: 'sticky', top: '100px' }}>
              <h3 style={{ marginBottom: '1.5rem', borderBottom: '1px solid var(--border)', paddingBottom: '1rem' }}>Summary</h3>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem' }}><span>Subtotal</span><span>${totalPrice.toFixed(2)}</span></div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', paddingTop: '1rem', borderTop: '1px solid var(--border)', fontSize: '1.25rem', fontWeight: 'bold' }}>
                <span>Total</span><span style={{ color: 'var(--accent-primary)' }}>${totalPrice.toFixed(2)}</span>
              </div>
              <button className="btn btn-primary" style={{ width: '100%', padding: '1rem' }} onClick={() => navigate('/checkout')}>Proceed to Checkout</button>
            </div>
          </div>
        </div>
      );
    };

    const Checkout = () => {
      const { cartItems, clearCart } = useCart();
      const { totalPrice } = useCartTotal();
      const [success, setSuccess] = useState(false);
      const navigate = useNavigate();

      if (cartItems.length === 0 && !success) { navigate('/cart'); return null; }

      const handleSubmit = (e) => {
        e.preventDefault();
        setSuccess(true);
        clearCart();
      };

      if (success) return (
        <div className="container page animate-in" style={{ textAlign: 'center', paddingTop: '6rem' }}>
          <h2 style={{ color: 'var(--success)', marginBottom: '1rem' }}>Order Confirmed!</h2>
          <p style={{ marginBottom: '2rem' }}>Your order has been placed successfully.</p>
          <button className="btn btn-primary" onClick={() => navigate('/')}>Return Home</button>
        </div>
      );

      return (
        <div className="container page animate-in" style={{ display: 'grid', gridTemplateColumns: '600px 350px', gap: '4rem', justifyContent: 'center' }}>
          <div className="glass" style={{ padding: '3rem', borderRadius: '16px' }}>
            <h2 style={{ marginBottom: '2rem' }}>Shipping & Payment</h2>
            <form onSubmit={handleSubmit}>
              <div className="form-group"><label>Name</label><input type="text" className="form-control" required/></div>
              <div className="form-group"><label>Address</label><textarea className="form-control" required rows="3"></textarea></div>
              <div className="form-group" style={{ marginBottom: '3rem' }}><label>Card Number</label><input type="text" className="form-control" required/></div>
              <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '1rem' }}>Pay ${totalPrice.toFixed(2)}</button>
            </form>
          </div>
        </div>
      );
    };

    // --- App Bootstrapper ---
    
    const App = () => (
      <Router>
        <Navbar />
        <Routes>
          <Route path="/" element={<Home />} />
          <Route path="/products" element={<Products />} />
          <Route path="/products/:id" element={<ProductDetail />} />
          <Route path="/cart" element={<Cart />} />
          <Route path="/checkout" element={<Checkout />} />
          <Route path="*" element={<Navigate to="/" replace />} />
        </Routes>
      </Router>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <CartProvider>
        <App />
      </CartProvider>
    );
  </script>
</body>
</html>
